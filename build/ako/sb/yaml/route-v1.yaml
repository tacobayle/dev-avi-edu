apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: route-v1
spec:
  parentRefs:
    - name: gw-multiple-listeners
  hostnames:
    - "route-v1.sb.vclass.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: svc-v1
          port: 80
---
- hosts: localhost
  gather_facts: no

  vars:
    avi_version: 31.1.2
    controller: sa-avicon-01.vclass.local
    avi_password: VMware1!
    avi_username: avi-edu
    nsxt:
      networks_data:
        - display_name: SA-Overlay-VIP
          tier1: SA-T1

  collections:
    - vmware.alb

  tasks:

    - name: Set variable avi_credentials
      set_fact:
        avi_credentials:
          api_version: "{{ avi_version }}"
          controller: "{{ controller }}"
          password: "{{ avi_password }}"
          username: "{{ avi_username }}"

    - name: retrieve cloudconnectoruser NSX
      vmware.alb.avi_api_session:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        http_method: get
        timeout: 300
        path: cloudconnectoruser?name=SA-NSX
      register: register_cloudconnectoruser_output

    - set_fact:
        nsx_avi_cloudconnectoruser_uuid: "{{ register_cloudconnectoruser_output.obj.results[0].uuid }}"

    - name: retrieve transport zone
      vmware.alb.avi_api_session:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        http_method: post
        data:
          credentials_uuid: "{{ nsx_avi_cloudconnectoruser_uuid }}"
          host: 172.20.10.41
        timeout: 300
        path: nsxt/transportzones
      register: register_transport_zones
      when:
        - nsx_avi_cloudconnectoruser_uuid is defined

    - name: retrieve transport_zone_id
      set_fact:
        transport_zone_id: "{{ register_transport_zones.obj.resource.nsxt_transportzones | selectattr('name', 'equalto', 'PROD-Overlay-TZ') | first | default({}) | json_query('id')}}"
      when:
        - register_transport_zones is defined

    - name: retrieve tier1s
      vmware.alb.avi_api_session:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        http_method: post
        data:
          credentials_uuid: "{{ nsx_avi_cloudconnectoruser_uuid }}"
          host: 172.20.10.41
        timeout: 300
        path: nsxt/tier1s
      register: register_tier1s
      when:
        - nsx_avi_cloudconnectoruser_uuid is defined

    - name: retrieve tier1 - SA-T1
      set_fact:
        nsxt_tier1: "{{ register_tier1s.obj.resource.nsxt_tier1routers | selectattr('name', 'equalto', 'SA-T1') | first | default({}) }}"
      when:
        - register_tier1s is defined

    - name: Debug
      debug:
        msg: "{{ nsxt_tier1 }}"

    - name: retrieve segments
      vmware.alb.avi_api_session:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        http_method: post
        data:
          credentials_uuid: "{{ nsx_avi_cloudconnectoruser_uuid }}"
          host: 172.20.10.41
          transport_zone_id: "{{ transport_zone_id }}"
        timeout: 300
        path: nsxt/segments
      register: register_segments
      when:
        - nsx_avi_cloudconnectoruser_uuid is defined
        - transport_zone_id is defined

    - name: retrieve segment details for mgmt
      set_fact:
        nsxt_segment_mgmt: "{{ register_segments.obj.resource.nsxt_segments | selectattr('name', 'equalto', 'SA-Overlay-Mgmt') | first | default({}) }}"
      when:
        - register_segments is defined

    - name: Debug
      debug:
        msg: "{{ nsxt_segment_mgmt }}"
      tags:
        - debug

    - name: retrieve tier1s for vips segments
      set_fact:
        nsxt_tier1s_vip: "{{ nsxt_tier1s_vip | default([]) + [item.1] }}"
      loop: "{{ nsxt.networks_data | product(register_tier1s.obj.resource.nsxt_tier1routers) }}"
      loop_control:
        label: "{{ item.0 }}"
      tags:
        - cloud
        - nsxtApi
      when:
        - nsxt.networks_data is defined
        - register_tier1s.obj.resource.nsxt_tier1routers is defined
        - item.0.tier1 == item.1.name

    - name: Debug
      debug:
        msg: "{{ nsxt_tier1s_vip }}"
      tags:
        - debug

    - name: retrieve segment details for vip segments
      set_fact:
        nsxt_segments_vip: "{{ nsxt_segments_vip | default([]) + [item.1] }}"
      loop: "{{ nsxt.networks_data | product(register_segments.obj.resource.nsxt_segments) }}"
      loop_control:
        label: "{{ item.0 }}"
      tags:
        - cloud
        - nsxtApi
      when:
        - nsxt.networks_data is defined
        - register_segments.obj.resource.nsxt_segments is defined
        - item.0.display_name == item.1.name

    - name: Debug
      debug:
        msg: "{{ nsxt_segments_vip }}"
      tags:
        - debug

    - name: Defining tier1_lrs list
      set_fact:
        tier1_lrs: "{{ tier1_lrs | default([]) + [{ 'tier1_lr_id': item.0.id, 'segment_id': item.1.id }] }}"
      loop: "{{ nsxt_tier1s_vip | zip(nsxt_segments_vip) | list }}"
      when:
        - nsxt_tier1s_vip is defined
        - nsxt_segments_vip is defined

    - name: Configure Avi Cloud - NSXT
      vmware.alb.avi_cloud:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        name: nsx-overlay-cloud
        vtype: CLOUD_NSXT
        nsxt_configuration:
          nsxt_url: 172.20.10.41
          vpc_mode: false
          site_id: default
          enforcementpoint_id: default
          domain_id: default
          automate_dfw_rules: false
          management_network_config:
            tz_type: OVERLAY
            transport_zone: "{{ transport_zone_id }}"
            overlay_segment:
              tier1_lr_id: "{{ nsxt_tier1.id }}"
              segment_id: "{{ nsxt_segment_mgmt.id }}"
          data_network_config:
            tz_type: OVERLAY
            transport_zone: "{{ transport_zone_id }}"
            tier1_segment_config:
              segment_config_mode: TIER1_SEGMENT_MANUAL
              manual:
                tier1_lrs: "{{ tier1_lrs }}"
          nsxt_credentials_ref: "/api/cloudconnectoruser/{{ nsx_avi_cloudconnectoruser_uuid }}"
        dhcp_enabled: false
        obj_name_prefix: sa_nsx_overlay
      register: register_cloud_nsxt

    - set_fact:
        cloud_nsxt_uuid: "{{ register_cloud_nsxt.obj.uuid }}"
      when:
        - register_cloud_nsxt.obj.uuid is defined

    - name: sleep for 20 seconds and continue with play
      wait_for: timeout=20

    - name: retrieve cloudconnectoruser vCenter
      vmware.alb.avi_api_session:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        http_method: get
        timeout: 300
        path: cloudconnectoruser?name=SA-vCenter
      register: register_cloudconnectoruser_vcenter_output

    - set_fact:
        vcenter_avi_cloudconnectoruser_uuid: "{{ register_cloudconnectoruser_vcenter_output.obj.results[0].uuid }}"

    - name: retrieve vcenter content libraries
      vmware.alb.avi_api_session:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        http_method: post
        data:
          credentials_uuid: "{{ vcenter_avi_cloudconnectoruser_uuid }}"
          host: sa-vcsa-01.vclass.local
        timeout: 300
        path: vcenter/contentlibraries
      register: register_content_library

    - name: retrieve content libraries details
      set_fact:
        vcenter_content_library_id: "{{ register_content_library.obj.resource.vcenter_clibs[0].id }}"

    - name: Configure Vcenter Servers for NSXT cloud - NSXT
      avi_vcenterserver:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        name: sa-vcsa-01
        cloud_ref: "/api/cloud/?name=nsx-overlay-cloud"
        vcenter_url: sa-vcsa-01.vclass.local
        content_lib:
          id: "{{ vcenter_content_library_id }}"
        vcenter_credentials_ref: "/api/cloudconnectoruser/{{ vcenter_avi_cloudconnectoruser_uuid }}"
      register: register_avi_vcenterserver

    - set_fact:
        vcenter_uuid: "{{ register_avi_vcenterserver.obj.uuid }}"
      when:
        - register_avi_vcenterserver.obj.uuid is defined

    - name: sleep for 60 seconds and continue with play
      wait_for: timeout=60

    - name: get Network details - NSXT
      vmware.alb.avi_api_session:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        http_method: get
        timeout: 300
        path: network
        params:
          page_size: -1
      register: register_avi_api_session_network

    - name: Retrieve Network Mgt uuid
      set_fact:
        network_mgmt_uuid: "{{ item.uuid }}"
      loop: "{{ register_avi_api_session_network.obj.results }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - item.name == "SA-Overlay-Mgmt"

    - name: Define usable_networks for IPAM with MGMT network
      set_fact:
        usable_networks: "{{ usable_networks | default([]) + [{'nw_ref': '/api/network/' + network_mgmt_uuid }] }}"

    - name: Debug
      debug:
        msg: "{{ usable_networks }}"

    - name: Set IP details of Mgmt Network
      set_fact:
        configured_subnets_mgmt:
          - prefix:
              mask: 24
              ip_addr:
                type: V4
                addr: 21.0.0.0
            static_ip_ranges:
              - range:
                  begin:
                    type: V4
                    addr: 21.0.0.100
                  end:
                    type: V4
                    addr: 21.0.0.120

    - name: Update Mgmt Network - NSXT
      vmware.alb.avi_network:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        cloud_ref: "/api/cloud/?name=nsx-overlay-cloud"
        tenant_ref: "/api/tenant/?name={{ item.tenant_ref | default('admin') }}"
        avi_api_patch_op : add
        avi_api_update_method: patch
        uuid: "{{ network_mgmt_uuid | default(omit) }}"
        name: SA-overlay-Mgmt
        dhcp_enabled: false
        exclude_discovered_subnets: true
        configured_subnets: "{{ configured_subnets_mgmt }}"

    - name: Retrieve Network Data uuid
      set_fact:
        network_data_uuid: "{{ item.uuid }}"
      loop: "{{ register_avi_api_session_network.obj.results }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - item.name == "SA-Overlay-VIP"

    - name: Define usable_networks for IPAM with MGMT network
      set_fact:
        usable_networks: "{{ usable_networks | default([]) + [{'nw_ref': '/api/network/' + network_data_uuid }] }}"

    - name: Debug
      debug:
        msg: "{{ usable_networks }}"

    - name: Set IP details of Mgmt Network
      set_fact:
        configured_subnets_data:
          - prefix:
              mask: 24
              ip_addr:
                type: V4
                addr: 22.0.0.0
            static_ip_ranges:
              - range:
                  begin:
                    type: V4
                    addr: 22.0.0.100
                  end:
                    type: V4
                    addr: 22.0.0.120

    - name: Update VIP Network - NSXT
      vmware.alb.avi_network:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        cloud_ref: "/api/cloud/?name=nsx-overlay-cloud"
        tenant_ref: "/api/tenant/?name={{ item.tenant_ref | default('admin') }}"
        avi_api_patch_op : add
        avi_api_update_method: patch
        uuid: "{{ network_data_uuid | default(omit) }}"
        name: SA-Overlay-VIP
        dhcp_enabled: false
        exclude_discovered_subnets: true
        configured_subnets: "{{ configured_subnets_data }}"

    - name: Create/update Avi IPAM - NSXT
      vmware.alb.avi_ipamdnsproviderprofile:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        internal_profile:
          usable_networks: "{{ usable_networks }}"
        name: nsx-overlay-ipam
        type: IPAMDNS_TYPE_INTERNAL

    - name: sleep for 20 seconds and continue with play
      wait_for: timeout=20

    - name: Update NSX Cloud with IPAM and DNS
      vmware.alb.avi_cloud:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        name: nsx-overlay-cloud
        vtype: CLOUD_NSXT
        nsxt_configuration:
          nsxt_url: 172.20.10.41
          vpc_mode: false
          site_id: default
          enforcementpoint_id: default
          domain_id: default
          automate_dfw_rules: false
          management_network_config:
            tz_type: OVERLAY
            transport_zone: "{{ transport_zone_id }}"
            overlay_segment:
              tier1_lr_id: "{{ nsxt_tier1.id }}"
              segment_id: "{{ nsxt_segment_mgmt.id }}"
          data_network_config:
            tz_type: OVERLAY
            transport_zone: "{{ transport_zone_id }}"
            tier1_segment_config:
              segment_config_mode: TIER1_SEGMENT_MANUAL
              manual:
                tier1_lrs: "{{ tier1_lrs }}"
          nsxt_credentials_ref: "/api/cloudconnectoruser/{{ nsx_avi_cloudconnectoruser_uuid }}"
        dhcp_enabled: false
        obj_name_prefix: sa_nsx_overlay
        dns_provider_ref: "/api/ipamdnsproviderprofile/?name=SA-DNS"
        ipam_provider_ref: "/api/ipamdnsproviderprofile/?name=nsx-overlay-ipam"
      register: register_cloud_nsxt

    - name: Update vrf with default route for VIP network
      vmware.alb.avi_vrfcontext:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        avi_api_patch_op : add
        avi_api_update_method: patch
        cloud_ref: "/api/cloud/?name=nsx-overlay-cloud"
        name: SA-T1
        static_routes:
          - prefix:
              ip_addr:
                addr: "0.0.0.0"
                type: V4
              mask: "0"
            next_hop:
              addr: 22.0.0.1
              type: V4
            route_id: "1"

    - name: Update vrf with default route for management
      vmware.alb.avi_vrfcontext:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        avi_api_patch_op : add
        avi_api_update_method: patch
        cloud_ref: "/api/cloud/?name=nsx-overlay-cloud"
        name: management
        static_routes:
          - prefix:
              ip_addr:
                addr: "0.0.0.0"
                type: V4
              mask: "0"
            next_hop:
              addr: 21.0.0.1
              type: V4
            route_id: "1"

    - name: get cloud-inventory
      vmware.alb.avi_api_session:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        http_method: get
        timeout: 300
        path: "cloud-inventory/?name=nsx-overlay-cloud"
      register: register_cloudinventory
      until:
        - register_cloudinventory.obj.results[0].status.se_image_state[0].state == "IMG_GEN_COMPLETE"
        - register_cloudinventory.obj.results[0].status.state == "CLOUD_STATE_PLACEMENT_READY"
      retries: 60
      delay: 20

    - name: Modify/Creating SE group
      vmware.alb.avi_serviceenginegroup:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        cloud_ref: "/api/cloud/?name=nsx-overlay-cloud"
        avi_api_update_method: put
        name: Default-Group
        min_scaleout_per_vs: 2
        max_scaleout_per_vs: 4
        buffer_se: 0
        max_vs_per_se: 10
        ha_mode: HA_MODE_SHARED_PAIR
        algo: PLACEMENT_ALGO_PACKED
        vcpus_per_se: 1
        memory_per_se: 2048
        mem_reserve: false
        disk_per_se: 15
        vcenters:
          - vcenter_ref: "/api/vcenterserver/{{ vcenter_uuid }}"
            nsxt_clusters:
              cluster_ids:
                - domain-c26
              include: true
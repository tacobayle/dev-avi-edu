---
- hosts: localhost
  gather_facts: no

  vars:
    avi_version: 31.1.2
    controller: sa-avicon-01.vclass.local
    avi_password: VMware1!
    avi_username: admin
    avi_old_password: 58NFaGDJm(PJH0G

  collections:
    - vmware.alb

  tasks:

    - name: Set variable avi_credentials
      set_fact:
        avi_credentials:
          api_version: "{{ avi_version }}"
          controller: "{{ controller }}"
          password: "{{ avi_password }}"
          username: "{{ avi_username }}"

    - name: Update user admin password
      vmware.alb.avi_useraccount:
        controller: "{{ controller }}"
        username: "{{ avi_username }}"
        password: "{{ avi_password }}"
        old_password: "{{ avi_old_password }}"
        api_version: "{{ avi_version }}"

    - name: avi-edu user creation
      vmware.alb.avi_user:
        avi_credentials: "{{ avi_credentials }}"
        name: avi-edu
        obj_username: avi-edu
        obj_password: VMware1!
        access:
          - role_ref: "/api/role?name=System-Admin"
            tenant_ref: "/api/tenant/admin#admin"
          - all_tenants: true
            role_ref: "/api/role?name=System-Admin"
        user_profile_ref: "/api/useraccountprofile?name=Default-User-Account-Profile"
        is_active: true
        is_superuser: true
        default_tenant_ref: "/api/tenant/?name=admin"

    - name: terraform user creation
      vmware.alb.avi_user:
        avi_credentials: "{{ avi_credentials }}"
        name: terraform
        obj_username: terraform
        obj_password: VMware1!
        access:
          - role_ref: "/api/role?name=System-Admin"
            tenant_ref: "/api/tenant/admin#admin"
          - all_tenants: true
            role_ref: "/api/role?name=System-Admin"
        user_profile_ref: "/api/useraccountprofile?name=Default-User-Account-Profile"
        is_active: true
        is_superuser: true
        default_tenant_ref: "/api/tenant/?name=admin"

    - name: ansible user creation
      vmware.alb.avi_user:
        avi_credentials: "{{ avi_credentials }}"
        name: ansible
        obj_username: ansible
        obj_password: VMware1!
        access:
          - role_ref: "/api/role?name=System-Admin"
            tenant_ref: "/api/tenant/admin#admin"
          - all_tenants: true
            role_ref: "/api/role?name=System-Admin"
        user_profile_ref: "/api/useraccountprofile?name=Default-User-Account-Profile"
        is_active: true
        is_superuser: true
        default_tenant_ref: "/api/tenant/?name=admin"

    - name: Set variable avi_credentials
      set_fact:
        avi_credentials:
          api_version: "{{ avi_version }}"
          controller: "{{ controller }}"
          password: "{{ avi_password }}"
          username: avi-edu

    - name: Create Backup Configuration passphrase
      vmware.alb.avi_backupconfiguration:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        state: present
        backup_passphrase: "{{ avi_password }}"
        name: Backup-Configuration
        save_local: true

    - name: Create SSL Keys and Certificates for the UI
      avi_sslkeyandcertificate:
        avi_credentials: "{{ avi_credentials }}"
        name: sa-avicon-01.vclass.local
        format: SSL_PEM
        certificate_base64: true
        enable_ocsp_stapling: false
        import_key_to_hsm: false
        is_federated: false
        key_base64: true
        type: SSL_CERTIFICATE_TYPE_SYSTEM
        certificate:
          days_until_expire: 365
          self_signed: true
          version: '2'
          signature_algorithm: sha256WithRSAEncryption
          subject_alt_names:
            - 172.20.10.130
            - sa-avicon-01
            - sa-avicon-01.vclass.local
          issuer:
            common_name: sa-avicon-01.vclass.local
            distinguished_name: CN=sa-avicon-01.vclass.local
          subject:
            common_name: sa-avicon-01.vclass.local
            distinguished_name: CN=sa-avicon-01.vclass.local
        key_params:
          algorithm: SSL_KEY_ALGORITHM_RSA
          rsa_params:
            exponent: 65537
            key_size: SSL_KEY_2048_BITS
        ocsp_config:
          failed_ocsp_jobs_retry_interval: 3600
          max_tries: 10
          ocsp_req_interval: 86400
          url_action: OCSP_RESPONDER_URL_FAILOVER

    - name: Create SSL Keys and Certificates for the lab HTML
      avi_sslkeyandcertificate:
        avi_credentials: "{{ avi_credentials }}"
        name: lab-vs.sa.vclass.local
        format: SSL_PEM
        certificate_base64: true
        enable_ocsp_stapling: false
        import_key_to_hsm: false
        is_federated: false
        key_base64: true
        type: SSL_CERTIFICATE_TYPE_VIRTUALSERVICE
        certificate:
          days_until_expire: 365
          self_signed: true
          version: '2'
          signature_algorithm: sha256WithRSAEncryption
          subject_alt_names:
            - 192.168.140.154
            - lab-vs
            - lab-vs.sa.vclass.local
          issuer:
            common_name: lab-vs.sa.vclass.local
            distinguished_name: CN=lab-vs.sa.vclass.local
          subject:
            common_name: lab-vs.sa.vclass.local
            distinguished_name: CN=lab-vs.sa.vclass.local
        key_params:
          algorithm: SSL_KEY_ALGORITHM_RSA
          rsa_params:
            exponent: 65537
            key_size: SSL_KEY_2048_BITS
        ocsp_config:
          failed_ocsp_jobs_retry_interval: 3600
          max_tries: 10
          ocsp_req_interval: 86400
          url_action: OCSP_RESPONDER_URL_FAILOVER

    - name: Configure Avi System parameters - with portal cert
      vmware.alb.avi_systemconfiguration:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        portal_configuration:
          sslkeyandcertificate_refs:
            - "/api/sslkeyandcertificate/?name=sa-avicon-01.vclass.local"
        dns_configuration:
          search_domain: 'vclass.local'
          server_list:
            - type: V4
              addr: 172.20.10.10
        ntp_configuration:
          ntp_servers:
            - server:
                type: V4
                addr: 10.213.120.2
            - server:
                type: V4
                addr: 10.213.120.3
            - server:
                type: V4
                addr: 10.213.248.2
            - server:
                type: V4
                addr: 10.213.248.3
        email_configuration:
          from_email: admin@avicontroller.net
          smtp_type: SMTP_LOCAL_HOST
        welcome_workflow_complete: true
        default_license_tier: "ENTERPRISE"

    - name: sleep for 30 seconds and continue with play
      wait_for: timeout=30

    - name: Create a Cloud connector user for NSX-T
      vmware.alb.avi_cloudconnectoruser:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        name: SA-NSX
        nsxt_credentials:
          username: "avi_admin"
          password: VMware1!VMware1!

    - name: Create vCenter cloud connector user
      vmware.alb.avi_cloudconnectoruser:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        name: SA-vCenter
        vcenter_credentials:
          username: "avi_admin@vsphere.local"
          password: VMware1!

    - name: Create a ssh user for Avi backup config.
      vmware.alb.avi_cloudconnectoruser:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        name: aviadmin
        obj_password: VMware1!

    - name: Create a ssh user for LSC cloud
      vmware.alb.avi_cloudconnectoruser:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        name: ubuntu
        obj_password: VMware1!

    - name: Configure DNS Profile
      vmware.alb.avi_ipamdnsproviderprofile:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        allocate_ip_in_vrf: false
        name: SA-DNS
        type: IPAMDNS_TYPE_INTERNAL_DNS
        internal_profile:
          dns_service_domain:
            - domain_name: sa.vclass.local
              pass_through: true
          ttl: 30

    - name: Configure vCenter Cloud
      vmware.alb.avi_cloud:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        name:  SA-vCenter-Cloud
        vtype: CLOUD_VCENTER
        prefer_static_routes: false
        vcenter_configuration:
          username: administrator@vsphere.local
          password: VMware1!
          vcenter_url: sa-vcsa-01.vclass.local
          privilege: WRITE_ACCESS
          datacenter: SiteA-Production
          use_content_lib: false
        dhcp_enabled: false
      register: output_cloud_vcenter

    - set_fact:
        cloud_vcenter_uuid: "{{ output_cloud_vcenter.obj.uuid }}"

    - name: Wait for network sync for cloud to complete...
      vmware.alb.avi_api_session:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        http_method: "get"
        path: "cloudruntime/{{ cloud_vcenter_uuid }}"
        params:
          name: SA-vCenter-Cloud
      register: cloudruntime
      until: cloudruntime.obj.network_sync_complete
      retries: 40
      delay: 10

    - name: Add cloud management network
      vmware.alb.avi_api_session:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        http_method: "patch"
        path: '{{ "cloud/" + cloud_vcenter_uuid }}'
        data:
          replace:
            vcenter_configuration:
              management_network: "/api/vimgrnwruntime/?name=pg-SA-Management"

    - name: Update pg-SA-Management
      vmware.alb.avi_network:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        cloud_ref: "/api/cloud/?name=SA-vCenter-Cloud"
        tenant: admin
        avi_api_patch_op : add
        avi_api_update_method: patch
        name: pg-SA-Management
        dhcp_enabled: true
        exclude_discovered_subnets: true
        configured_subnets:
          - prefix:
              mask: 24
              ip_addr:
                type: V4
                addr: 172.20.10.0
            static_ip_ranges:
              - range:
                  begin:
                    type: V4
                    addr: 172.20.10.30
                  end:
                    type: V4
                    addr: 172.20.10.32
                type: STATIC_IPS_FOR_SE

    - name: Update pg-SA-VIP
      vmware.alb.avi_network:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        cloud_ref: "/api/cloud/?name=SA-vCenter-Cloud"
        tenant: admin
        avi_api_patch_op : add
        avi_api_update_method: patch
        name: pg-SA-VIP
        dhcp_enabled: true
        exclude_discovered_subnets: true
        configured_subnets:
          - prefix:
              mask: 24
              ip_addr:
                type: V4
                addr: 192.168.140.0
            static_ip_ranges:
              - range:
                  begin:
                    type: V4
                    addr: 192.168.140.10
                  end:
                    type: V4
                    addr: 192.168.140.13
                type: STATIC_IPS_FOR_SE
              - range:
                  begin:
                    type: V4
                    addr: 192.168.140.14
                  end:
                    type: V4
                    addr: 192.168.140.130
                type: STATIC_IPS_FOR_VIP

    - name: Update pg-SA-Web
      vmware.alb.avi_network:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        cloud_ref: "/api/cloud/?name=SA-vCenter-Cloud"
        tenant: admin
        avi_api_patch_op : add
        avi_api_update_method: patch
        name: pg-SA-Web
        dhcp_enabled: true
        exclude_discovered_subnets: true
        configured_subnets:
          - prefix:
              mask: 24
              ip_addr:
                type: V4
                addr: 192.168.130.0
            static_ip_ranges:
              - range:
                  begin:
                    type: V4
                    addr: 192.168.130.100
                  end:
                    type: V4
                    addr: 192.168.130.110
                type: STATIC_IPS_FOR_SE

    - set_fact:
        usable_networks: "{{ usable_networks | default([]) + [{ 'nw_ref': lookup('community.network.avi', avi_credentials=avi_credentials, obj_name='pg-SA-VIP', obj_type='network').uuid }] }}"

    - name: Create Avi IPAM - vCenter
      vmware.alb.avi_ipamdnsproviderprofile:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        internal_profile:
          usable_networks: "{{ usable_networks }}"
        name: SA-IPAM-vSphere
        type: IPAMDNS_TYPE_INTERNAL

    - name: Update Avi Cloud with IPAM and DNS
      vmware.alb.avi_cloud:
        avi_api_update_method: patch
        avi_api_patch_op: add
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        name:  SA-vCenter-Cloud
        vtype: CLOUD_VCENTER
        prefer_static_routes: false
        vcenter_configuration:
          username: administrator@vsphere.local
          password: VMware1!
          vcenter_url: sa-vcsa-01.vclass.local
          privilege: WRITE_ACCESS
          datacenter: SiteA-Production
          use_content_lib: false
        dhcp_enabled: false
        ipam_provider_ref: "/api/ipamdnsproviderprofile/?name=SA-IPAM-vSphere"
        dns_provider_ref: "/api/ipamdnsproviderprofile/?name=SA-DNS"

    - name: Retrieve cluster uuid
      vmware.alb.avi_api_session:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        http_method: "get"
        path: "vimgrclusterruntime?name=[SiteA-Edge-Cluster-01]"
      register: register_cluster

    - set_fact:
        cluster_vcenter_uuid: "{{ register_cluster.obj.results[0].uuid }}"

    - name: Modify/Creating SE group
      vmware.alb.avi_serviceenginegroup:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        cloud_ref: "/api/cloud/?name=SA-vCenter-Cloud"
        avi_api_update_method: put
        name: Default-Group
        min_scaleout_per_vs: 1
        max_scaleout_per_vs: 4
        buffer_se: 1
        max_vs_per_se: 30
        vcpus_per_se: 1
        memory_per_se: 2048
        mem_reserve: false
        disk_per_se: 15
        vcenter_clusters:
          cluster_refs:
          - "/api/vimgrclusterruntime/{{ cluster_vcenter_uuid }}"
          include: true

    - name: Create vsvip for dns VS
      vmware.alb.avi_vsvip:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        name: "vsvip-SA-DNS-01"
        cloud_ref: "/api/cloud/?name=SA-vCenter-Cloud"
        dns_info:
          - fqdn: "sa-dns-01.sa.vclass.local"
        vip:
          - enabled: true
            ip_address:
              addr: 192.168.140.153
              type: V4
            vip_id: 1

    - name: Create DNS Virtualservice
      vmware.alb.avi_virtualservice:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        name: SA-DNS-01
        application_profile_ref: "/api/applicationprofile/?name=System-DNS"
        network_profile_ref: "/api/networkprofile/?name=System-UDP-Per-Pkt"
        cloud_ref: "/api/cloud/?name=SA-vCenter-Cloud"
        services:
          - enable_ssl: false
            port: 53
          - enable_ssl: false
            port: 53
            override_network_profile_ref: "/api/networkprofile/?name=System-TCP-Proxy"
        vsvip_ref: "/api/vsvip/?name=vsvip-SA-DNS-01"
        analytics_policy:
          udf_log_throttle: 10
          metrics_realtime_update:
            duration: 0
            enabled: true
          significant_log_throttle: 0
          client_insights: NO_INSIGHTS
          full_client_logs:
            duration: 0
            throttle: 10
            enabled: true
          all_headers: true

    - name: Update system config with first DNS VS - vCenter
      vmware.alb.avi_systemconfiguration:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        avi_api_patch_op : add
        avi_api_update_method: patch
        dns_virtualservice_refs: "/api/virtualservice/?name=SA-DNS-01"

    - name: Create vsvip for lab vs
      vmware.alb.avi_vsvip:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        name: "vsvip-lab-vs"
        cloud_ref: "/api/cloud/?name=SA-vCenter-Cloud"
        dns_info:
          - fqdn: "lab-vs.sa.vclass.local"
        vip:
          - enabled: true
            ip_address:
              addr: 192.168.140.154
              type: V4
            vip_id: 1

    - name: Create pool for lab vs
      vmware.alb.avi_pool:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        avi_api_patch_op : add
        avi_api_update_method: patch
        name: "pool-lab-vs"
        cloud_ref: "/api/cloud/?name=SA-vCenter-Cloud"
        default_server_port: "8080"
        health_monitor_refs:
          - "/api/healthmonitor?name=System-HTTP"
        servers:
          - ip:
              addr: "172.20.10.131"
              type: 'V4'
            hostname: "172.20.10.131"

    - name: Create VS for lab vs
      vmware.alb.avi_virtualservice:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        name: "lab-vs"
        cloud_ref: "/api/cloud/?name=SA-vCenter-Cloud"
        application_profile_ref: "/api/applicationprofile/?name=System-HTTP"
        ssl_profile_ref: "/api/sslprofile/?name=System-Standard"
        ssl_key_and_certificate_refs: "/api/sslkeyandcertificate/?name=lab-vs.sa.vclass.local"
        services:
          - enable_ssl: true
            port: 443
        pool_ref: "/api/pool?name=pool-lab-vs"
        vsvip_ref: "/api/vsvip/?name=vsvip-lab-vs"

    - name: Wait for the First VS to be ready
      vmware.alb.avi_api_session:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        http_method: get
        timeout: 300
        path: virtualservice-inventory
      register: register_status_vs
      until: register_status_vs.obj.results.0.runtime.oper_status.state == "OPER_UP"
      retries: 60
      delay: 30
---
- hosts: localhost
  gather_facts: no

  vars:
    avi_version: 31.1.2
    controller: sb-avicon-01.vclass.local
    avi_password: VMware1!
    avi_username: admin
    avi_old_password: 58NFaGDJm(PJH0G

  collections:
    - vmware.alb

  tasks:

    - name: Set variable avi_credentials
      set_fact:
        avi_credentials:
          api_version: "{{ avi_version }}"
          controller: "{{ controller }}"
          password: "{{ avi_password }}"
          username: "{{ avi_username }}"

    - name: Update user admin password
      vmware.alb.avi_useraccount:
        controller: "{{ controller }}"
        username: "{{ avi_username }}"
        password: "{{ avi_password }}"
        old_password: "{{ avi_old_password }}"
        api_version: "{{ avi_version }}"

    - name: user creation
      vmware.alb.avi_user:
        avi_credentials: "{{ avi_credentials }}"
        name: avi-edu
        obj_username: avi-edu
        obj_password: VMware1!
        access:
          - role_ref: "/api/role?name=System-Admin"
            tenant_ref: "/api/tenant/admin#admin"
          - all_tenants: true
            role_ref: "/api/role?name=System-Admin"
        user_profile_ref: "/api/useraccountprofile?name=Default-User-Account-Profile"
        is_active: true
        is_superuser: true
        default_tenant_ref: "/api/tenant/?name=admin"

    - name: Set variable avi_credentials
      set_fact:
        avi_credentials:
          api_version: "{{ avi_version }}"
          controller: "{{ controller }}"
          password: "{{ avi_password }}"
          username: avi-edu

    - name: Create Tenants
      avi_tenant:
        avi_credentials: "{{ avi_credentials }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        config_settings:
          se_in_provider_context: true
          tenant_access_to_provider_se: true
          tenant_vrf: false
        local: true
        name: tenant1

    - name: Create Tenants
      avi_tenant:
        avi_credentials: "{{ avi_credentials }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        config_settings:
          se_in_provider_context: true
          tenant_access_to_provider_se: true
          tenant_vrf: false
        local: true
        name: ako

    - name: Create Backup Configuration passphrase
      vmware.alb.avi_backupconfiguration:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        state: present
        backup_passphrase: "{{ avi_password }}"
        name: Backup-Configuration
        save_local: true

    - name: Create SSL Keys and Certificates
      avi_sslkeyandcertificate:
        avi_credentials: "{{ avi_credentials }}"
        name: sb-avicon-01.vclass.local
        format: SSL_PEM
        certificate_base64: true
        enable_ocsp_stapling: false
        import_key_to_hsm: false
        is_federated: false
        key_base64: true
        type: SSL_CERTIFICATE_TYPE_SYSTEM
        certificate:
          days_until_expire: 365
          self_signed: true
          version: '2'
          signature_algorithm: sha256WithRSAEncryption
          subject_alt_names:
            - 172.20.110.130
            - sb-avicon-01
            - sb-avicon-01.vclass.local
          issuer:
            common_name: sb-avicon-01.vclass.local
            distinguished_name: CN=sb-avicon-01.vclass.local
          subject:
            common_name: sb-avicon-01.vclass.local
            distinguished_name: CN=sb-avicon-01.vclass.local
        key_params:
          algorithm: SSL_KEY_ALGORITHM_RSA
          rsa_params:
            exponent: 65537
            key_size: SSL_KEY_2048_BITS
        ocsp_config:
          failed_ocsp_jobs_retry_interval: 3600
          max_tries: 10
          ocsp_req_interval: 86400
          url_action: OCSP_RESPONDER_URL_FAILOVER

    - name: Configure Avi System parameters - with portal cert
      vmware.alb.avi_systemconfiguration:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        portal_configuration:
          sslkeyandcertificate_refs:
            - "/api/sslkeyandcertificate/?name=sb-avicon-01.vclass.local"
        dns_configuration:
          search_domain: 'vclass.local'
          server_list:
            - type: V4
              addr: 172.20.10.10
        ntp_configuration:
          ntp_servers:
            - server:
                type: V4
                addr: 10.213.120.2
            - server:
                type: V4
                addr: 10.213.120.3
            - server:
                type: V4
                addr: 10.213.248.2
            - server:
                type: V4
                addr: 10.213.248.3
        email_configuration:
          from_email: admin@avicontroller.net
          smtp_type: SMTP_LOCAL_HOST
        welcome_workflow_complete: true
        default_license_tier: "ENTERPRISE"

    - name: sleep for 30 seconds and continue with play
      wait_for: timeout=30

    - name: Create NSX cloud connector user
      vmware.alb.avi_cloudconnectoruser:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        name: SB-NSX
        nsxt_credentials:
          username: "avi_admin"
          password: VMware1!VMware1!

    - name: Create vCenter cloud connector user
      vmware.alb.avi_cloudconnectoruser:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        name: SB-vCenter
        vcenter_credentials:
          username: "avi_admin@vsphere.local"
          password: VMware1!

    - name: Configure DNS Profile
      vmware.alb.avi_ipamdnsproviderprofile:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        allocate_ip_in_vrf: false
        name: SB-DNS
        type: IPAMDNS_TYPE_INTERNAL_DNS
        internal_profile:
          dns_service_domain:
            - domain_name: sb.vclass.local
              pass_through: true
          ttl: 30

    - name: Configure vCenter Cloud
      vmware.alb.avi_cloud:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        name:  SB-vCenter-Cloud
        vtype: CLOUD_VCENTER
        prefer_static_routes: false
        vcenter_configuration:
          username: administrator@vsphere.local
          password: VMware1!
          vcenter_url: sb-vcsa-01.vclass.local
          privilege: WRITE_ACCESS
          datacenter: SiteB-Production
          use_content_lib: false
        dhcp_enabled: false
      register: output_cloud_vcenter

    - set_fact:
        cloud_vcenter_uuid: "{{ output_cloud_vcenter.obj.uuid }}"

    - name: Wait for network sync for cloud to complete...
      vmware.alb.avi_api_session:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        http_method: "get"
        path: "cloudruntime/{{ cloud_vcenter_uuid }}"
        params:
          name: SB-vCenter-Cloud
      register: cloudruntime
      until: cloudruntime.obj.network_sync_complete
      retries: 40
      delay: 10

    - name: Add cloud management network
      vmware.alb.avi_api_session:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        http_method: "patch"
        path: '{{ "cloud/" + cloud_vcenter_uuid }}'
        data:
          replace:
            vcenter_configuration:
              management_network: "/api/vimgrnwruntime/?name=pg-SB-Management"

    - name: Update pg-SB-Management
      vmware.alb.avi_network:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        cloud_ref: "/api/cloud/?name=SB-vCenter-Cloud"
        tenant: admin
        avi_api_patch_op : add
        avi_api_update_method: patch
        name: pg-SB-Management
        dhcp_enabled: true

    - name: Update pg-SB-Web
      vmware.alb.avi_network:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        cloud_ref: "/api/cloud/?name=SB-vCenter-Cloud"
        tenant: admin
        avi_api_patch_op : add
        avi_api_update_method: patch
        name: pg-SB-Web
        dhcp_enabled: true
        exclude_discovered_subnets: true
        configured_subnets:
          - prefix:
              mask: 24
              ip_addr:
                type: V4
                addr: 192.168.131.0
            static_ip_ranges:
              - range:
                  begin:
                    type: V4
                    addr: 192.168.131.130
                  end:
                    type: V4
                    addr: 192.168.131.140

    - name: Update pg-SB-VIP
      vmware.alb.avi_network:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        cloud_ref: "/api/cloud/?name=SB-vCenter-Cloud"
        tenant: admin
        avi_api_patch_op : add
        avi_api_update_method: patch
        name: pg-SB-VIP
        dhcp_enabled: true
        exclude_discovered_subnets: true
        configured_subnets:
          - prefix:
              mask: 24
              ip_addr:
                type: V4
                addr: 192.168.141.0
            static_ip_ranges:
              - range:
                  begin:
                    type: V4
                    addr: 192.168.141.10
                  end:
                    type: V4
                    addr: 192.168.141.130

    - set_fact:
        usable_networks: "{{ usable_networks | default([]) + [{ 'nw_ref': lookup('community.network.avi', avi_credentials=avi_credentials, obj_name='pg-SB-VIP', obj_type='network').uuid }] }}"

    - name: Create Avi IPAM - vCenter
      vmware.alb.avi_ipamdnsproviderprofile:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        internal_profile:
          usable_networks: "{{ usable_networks }}"
        name: SB-IPAM-vSphere
        type: IPAMDNS_TYPE_INTERNAL


    - name: Update Avi Cloud with IPAM and DNS
      vmware.alb.avi_cloud:
        avi_api_update_method: patch
        avi_api_patch_op: add
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        name:  SB-vCenter-Cloud
        vtype: CLOUD_VCENTER
        prefer_static_routes: false
        vcenter_configuration:
          username: administrator@vsphere.local
          password: VMware1!
          vcenter_url: sb-vcsa-01.vclass.local
          privilege: WRITE_ACCESS
          datacenter: SiteB-Production
          use_content_lib: false
        dhcp_enabled: false
        ipam_provider_ref: "/api/ipamdnsproviderprofile/?name=SB-IPAM-vSphere"
        dns_provider_ref: "/api/ipamdnsproviderprofile/?name=SB-DNS"

    - name: Retrieve cluster uuid
      vmware.alb.avi_api_session:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        http_method: "get"
        path: "vimgrclusterruntime?name=[SiteB-Edge-Cluster-01]"
      register: register_cluster

    - set_fact:
        cluster_vcenter_uuid: "{{ register_cluster.obj.results[0].uuid }}"

    - name: Modify/Creating SE group - NSXT
      vmware.alb.avi_serviceenginegroup:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        cloud_ref: "/api/cloud/?name=SB-vCenter-Cloud"
        avi_api_update_method: put
        name: Default-Group
        min_scaleout_per_vs: 1
        max_scaleout_per_vs: 4
        buffer_se: 0
        max_vs_per_se: 30
        vcpus_per_se: 1
        memory_per_se: 2048
        mem_reserve: false
        disk_per_se: 15
        vcenter_clusters:
          cluster_refs:
            - "/api/vimgrclusterruntime/{{ cluster_vcenter_uuid }}"
          include: true

    - name: Create vsvip for dns VS
      vmware.alb.avi_vsvip:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        name: "vsvip-SB-DNS-01"
        cloud_ref: "/api/cloud/?name=SB-vCenter-Cloud"
        dns_info:
          - fqdn: "sb-dns-01.sb.vclass.local"
        vip:
          - enabled: true
            ip_address:
              addr: 192.168.141.153
              type: V4
            vip_id: 1

    - name: Create DNS Virtualservice
      vmware.alb.avi_virtualservice:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        name: SB-DNS-01
        application_profile_ref: "/api/applicationprofile/?name=System-DNS"
        network_profile_ref: "/api/networkprofile/?name=System-UDP-Per-Pkt"
        cloud_ref: "/api/cloud/?name=SB-vCenter-Cloud"
        services:
          - enable_ssl: false
            port: 53
          - enable_ssl: false
            port: 53
            override_network_profile_ref: "/api/networkprofile/?name=System-TCP-Proxy"
        vsvip_ref: "/api/vsvip/?name=vsvip-SB-DNS-01"
        analytics_policy:
          udf_log_throttle: 10
          metrics_realtime_update:
            duration: 0
            enabled: true
          significant_log_throttle: 0
          client_insights: NO_INSIGHTS
          full_client_logs:
            duration: 0
            throttle: 10
            enabled: true
          all_headers: true

    - name: Update system config with first DNS VS - vCenter
      vmware.alb.avi_systemconfiguration:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        avi_api_patch_op : add
        avi_api_update_method: patch
        dns_virtualservice_refs: "/api/virtualservice/?name=SB-DNS-01"

    - name: retrieve cloudconnectoruser NSX
      vmware.alb.avi_api_session:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        http_method: get
        timeout: 300
        path: cloudconnectoruser?name=SB-NSX
      register: register_cloudconnectoruser_output

    - set_fact:
        nsx_avi_cloudconnectoruser_uuid: "{{ register_cloudconnectoruser_output.obj.results[0].uuid }}"

    - name: retrieve transport zone
      vmware.alb.avi_api_session:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        http_method: post
        data:
          credentials_uuid: "{{ nsx_avi_cloudconnectoruser_uuid }}"
          host: 172.20.110.41
        timeout: 300
        path: nsxt/transportzones
      register: register_transport_zones
      when:
        - nsx_avi_cloudconnectoruser_uuid is defined

    - name: retrieve transport_zone_id
      set_fact:
        transport_zone_id: "{{ register_transport_zones.obj.resource.nsxt_transportzones | selectattr('name', 'equalto', 'PROD-VLAN-TZ') | first | default({}) | json_query('id')}}"
      when:
        - register_transport_zones is defined

    - name: retrieve segments
      vmware.alb.avi_api_session:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        http_method: post
        data:
          credentials_uuid: "{{ nsx_avi_cloudconnectoruser_uuid }}"
          host: 172.20.110.41
          transport_zone_id: "{{ transport_zone_id }}"
        timeout: 300
        path: nsxt/segments
      register: register_segments
      when:
        - nsx_avi_cloudconnectoruser_uuid is defined
        - transport_zone_id is defined

    - name: retrieve segment details for NSX-SB-AVI-MGMT
      set_fact:
        nsxt_segment_mgmt: "{{ register_segments.obj.resource.nsxt_segments | selectattr('name', 'equalto', 'NSX-SB-AVI-MGMT') | first | default({}) }}"
      when:
        - register_segments is defined

    - name: retrieve segment details for NSX-SB-VIP
      set_fact:
        nsxt_segment_vip: "{{ register_segments.obj.resource.nsxt_segments | selectattr('name', 'equalto', 'NSX-SB-VIP') | first | default({}) }}"
      when:
        - register_segments is defined

    - name: retrieve segment details for NSX-SB-WEB
      set_fact:
        nsxt_segment_web: "{{ register_segments.obj.resource.nsxt_segments | selectattr('name', 'equalto', 'NSX-SB-WEB') | first | default({}) }}"
      when:
        - register_segments is defined

    - name: Configure Avi Cloud - NSXT
      vmware.alb.avi_cloud:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        name: nsx-vlan-cloud
        vtype: CLOUD_NSXT
        nsxt_configuration:
          nsxt_url: 172.20.110.41
          vpc_mode: false
          site_id: default
          enforcementpoint_id: default
          domain_id: default
          automate_dfw_rules: false
          management_network_config:
            tz_type: VLAN
            transport_zone: "{{ transport_zone_id }}"
            vlan_segment: "{{ nsxt_segment_mgmt.id }}"
          data_network_config:
            tz_type: VLAN
            transport_zone: "{{ transport_zone_id }}"
            vlan_segments:
              - "{{ nsxt_segment_vip.id }}"
              - "{{ nsxt_segment_web.id }}"
          nsxt_credentials_ref: "/api/cloudconnectoruser/{{ nsx_avi_cloudconnectoruser_uuid }}"
        dhcp_enabled: false
        obj_name_prefix: sb_nsx_vlan
      register: register_cloud_nsxt

    - set_fact:
        cloud_nsxt_uuid: "{{ register_cloud_nsxt.obj.uuid }}"
      when:
        - register_cloud_nsxt.obj.uuid is defined

    - name: sleep for 20 seconds and continue with play
      wait_for: timeout=20

    - name: retrieve cloudconnectoruser SB-vCenter
      vmware.alb.avi_api_session:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        http_method: get
        timeout: 300
        path: cloudconnectoruser?name=SB-vCenter
      register: register_cloudconnectoruser_vcenter_output

    - set_fact:
        vcenter_avi_cloudconnectoruser_uuid: "{{ register_cloudconnectoruser_vcenter_output.obj.results[0].uuid }}"

    - name: retrieve vcenter content libraries
      vmware.alb.avi_api_session:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        http_method: post
        data:
          credentials_uuid: "{{ vcenter_avi_cloudconnectoruser_uuid }}"
          host: sb-vcsa-01.vclass.local
        timeout: 300
        path: vcenter/contentlibraries
      register: register_content_library

    - name: retrieve content libraries details
      set_fact:
        vcenter_content_library_id: "{{ register_content_library.obj.resource.vcenter_clibs[0].id }}"

    - name: Configure Vcenter Servers for NSXT cloud - NSXT
      avi_vcenterserver:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        name: sb-vcsa-01
        cloud_ref: "/api/cloud/?name=nsx-vlan-cloud"
        vcenter_url: sb-vcsa-01.vclass.local
        content_lib:
          id: "{{ vcenter_content_library_id }}"
        vcenter_credentials_ref: "/api/cloudconnectoruser/{{ vcenter_avi_cloudconnectoruser_uuid }}"
      register: register_avi_vcenterserver

    - set_fact:
        vcenter_uuid: "{{ register_avi_vcenterserver.obj.uuid }}"
      when:
        - register_avi_vcenterserver.obj.uuid is defined

    - name: sleep for 60 seconds and continue with play
      wait_for: timeout=60

    - name: get Network details - NSXT
      vmware.alb.avi_api_session:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        http_method: get
        timeout: 300
        path: network
        params:
          page_size: -1
      register: register_avi_api_session_network

    - name: Retrieve Network Mgt uuid
      set_fact:
        network_mgmt_uuid: "{{ item.uuid }}"
      loop: "{{ register_avi_api_session_network.obj.results }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - item.name == "NSX-SB-AVI-MGMT"

    - name: Define usable_networks_nsx for IPAM with MGMT network
      set_fact:
        usable_networks_nsx: "{{ usable_networks_nsx | default([]) + [{'nw_ref': '/api/network/' + network_mgmt_uuid }] }}"

    - name: Debug
      debug:
        msg: "{{ usable_networks_nsx }}"

    - name: Set IP details of Mgmt Network
      set_fact:
        configured_subnets_mgmt:
          - prefix:
              mask: 24
              ip_addr:
                type: V4
                addr: 192.168.151.0
            static_ip_ranges:
              - range:
                  begin:
                    type: V4
                    addr: 192.168.151.100
                  end:
                    type: V4
                    addr: 192.168.151.120

    - name: Update Mgmt Network - NSXT
      vmware.alb.avi_network:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        cloud_ref: "/api/cloud/?name=nsx-vlan-cloud"
        tenant_ref: "/api/tenant/?name={{ item.tenant_ref | default('admin') }}"
        avi_api_patch_op : add
        avi_api_update_method: patch
        uuid: "{{ network_mgmt_uuid | default(omit) }}"
        name: NSX-SB-AVI-MGMT
        dhcp_enabled: false
        exclude_discovered_subnets: true
        configured_subnets: "{{ configured_subnets_mgmt }}"

    - name: Retrieve Network Data uuid
      set_fact:
        network_data_uuid: "{{ item.uuid }}"
      loop: "{{ register_avi_api_session_network.obj.results }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - item.name == "NSX-SB-VIP"

    - name: Define usable_networks_nsx for IPAM with NSX-SB-VIP network
      set_fact:
        usable_networks_nsx: "{{ usable_networks_nsx | default([]) + [{'nw_ref': '/api/network/' + network_data_uuid }] }}"

    - name: Debug
      debug:
        msg: "{{ usable_networks_nsx }}"

    - name: Set IP details of NSX-SB-VIP Network
      set_fact:
        configured_subnets_data:
          - prefix:
              mask: 24
              ip_addr:
                type: V4
                addr: 192.168.141.0
            static_ip_ranges:
              - range:
                  begin:
                    type: V4
                    addr: 192.168.141.100
                  end:
                    type: V4
                    addr: 192.168.141.120

    - name: Update VIP Network - NSXT
      vmware.alb.avi_network:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        cloud_ref: "/api/cloud/?name=nsx-vlan-cloud"
        tenant_ref: "/api/tenant/?name={{ item.tenant_ref | default('admin') }}"
        avi_api_patch_op : add
        avi_api_update_method: patch
        uuid: "{{ network_data_uuid | default(omit) }}"
        name: NSX-SB-VIP
        dhcp_enabled: false
        exclude_discovered_subnets: true
        configured_subnets: "{{ configured_subnets_data }}"

    - name: Retrieve Network Data uuid
      set_fact:
        network_data_uuid: "{{ item.uuid }}"
      loop: "{{ register_avi_api_session_network.obj.results }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - item.name == "NSX-SB-WEB"

    - name: Define usable_networks_nsx for IPAM with NSX-SB-WEB network
      set_fact:
        usable_networks_nsx: "{{ usable_networks_nsx | default([]) + [{'nw_ref': '/api/network/' + network_data_uuid }] }}"

    - name: Debug
      debug:
        msg: "{{ usable_networks_nsx }}"

    - name: Set IP details of NSX-SB-WEB Network
      set_fact:
        configured_subnets_data:
          - prefix:
              mask: 24
              ip_addr:
                type: V4
                addr: 192.168.131.0
            static_ip_ranges:
              - range:
                  begin:
                    type: V4
                    addr: 192.168.131.100
                  end:
                    type: V4
                    addr: 192.168.131.120

    - name: Update VIP Network - NSXT
      vmware.alb.avi_network:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        cloud_ref: "/api/cloud/?name=nsx-vlan-cloud"
        tenant_ref: "/api/tenant/?name={{ item.tenant_ref | default('admin') }}"
        avi_api_patch_op : add
        avi_api_update_method: patch
        uuid: "{{ network_data_uuid | default(omit) }}"
        name: NSX-SB-WEB
        dhcp_enabled: false
        exclude_discovered_subnets: true
        configured_subnets: "{{ configured_subnets_data }}"

    - name: Create/update Avi IPAM - NSXT
      vmware.alb.avi_ipamdnsproviderprofile:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        internal_profile:
          usable_networks: "{{ usable_networks_nsx }}"
        name: nsx-vlan-ipam
        type: IPAMDNS_TYPE_INTERNAL

    - name: sleep for 20 seconds and continue with play
      wait_for: timeout=20

    - name: Update NSX Cloud with IPAM and DNS
      vmware.alb.avi_cloud:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        name: nsx-vlan-cloud
        vtype: CLOUD_NSXT
        nsxt_configuration:
          nsxt_url: 172.20.110.41
          vpc_mode: false
          site_id: default
          enforcementpoint_id: default
          domain_id: default
          automate_dfw_rules: false
          management_network_config:
            tz_type: VLAN
            transport_zone: "{{ transport_zone_id }}"
            vlan_segment: "{{ nsxt_segment_mgmt.id }}"
          data_network_config:
            tz_type: VLAN
            transport_zone: "{{ transport_zone_id }}"
            vlan_segments:
              - "{{ nsxt_segment_vip.id }}"
              - "{{ nsxt_segment_web.id }}"
          nsxt_credentials_ref: "/api/cloudconnectoruser/{{ nsx_avi_cloudconnectoruser_uuid }}"
        dhcp_enabled: false
        obj_name_prefix: sb_nsx_vlan
        dns_provider_ref: "/api/ipamdnsproviderprofile/?name=SB-DNS"
        ipam_provider_ref: "/api/ipamdnsproviderprofile/?name=nsx-vlan-ipam"
      register: register_cloud_nsxt

    - name: get cloud-inventory
      vmware.alb.avi_api_session:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        http_method: get
        timeout: 300
        path: "cloud-inventory/?name=nsx-vlan-cloud"
      register: register_cloudinventory
      until:
        - register_cloudinventory.obj.results[0].status.se_image_state[0].state == "IMG_GEN_COMPLETE"
        - register_cloudinventory.obj.results[0].status.state == "CLOUD_STATE_PLACEMENT_READY"
      retries: 60
      delay: 20

    - name: Update vrf with default route for management
      vmware.alb.avi_vrfcontext:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        avi_api_patch_op : add
        avi_api_update_method: patch
        cloud_ref: "/api/cloud/?name=nsx-vlan-cloud"
        name: management
        static_routes:
          - prefix:
              ip_addr:
                addr: "0.0.0.0"
                type: V4
              mask: "0"
            next_hop:
              addr: 192.168.151.1
              type: V4
            route_id: "1"

    - name: Modify/Creating SE group
      vmware.alb.avi_serviceenginegroup:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        cloud_ref: "/api/cloud/?name=nsx-vlan-cloud"
        avi_api_update_method: put
        name: Default-Group
        min_scaleout_per_vs: 1
        max_scaleout_per_vs: 4
        buffer_se: 0
        max_vs_per_se: 10
        vcpus_per_se: 1
        memory_per_se: 2048
        mem_reserve: false
        disk_per_se: 15
        vcenters:
          - vcenter_ref: "/api/vcenterserver/{{ vcenter_uuid }}"
            nsxt_clusters:
              cluster_ids:
                - domain-c1006
              include: true

    - name: Create dummy vsvip - NSXT
      vmware.alb.avi_vsvip:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        name: dummy-vsvip
        cloud_ref: "/api/cloud/?name=nsx-vlan-cloud"
        vrf_context_ref: "/api/vrfcontext/?name=global"
        tenant: tenant1
        dns_info:
          - fqdn: dummy-vs.sb.vclass.local
            type: DNS_RECORD_A
        vip:
          - auto_allocate_ip: true
            placement_networks:
              - network_ref: "/api/network/?name=NSX-SB-VIP"
                subnet:
                  mask: 24
                  ip_addr:
                    type: V4
                    addr: 192.168.141.0
            ipam_network_subnet:
              network_ref: "/api/network/?name=NSX-SB-VIP"
              subnet:
                mask: 24
                ip_addr:
                  type: V4
                  addr: 192.168.141.0

    - name: Create pool with servers
      avi_pool:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        avi_api_patch_op : add
        avi_api_update_method: patch
        name: "dummy-pool"
        cloud_ref: "/api/cloud/?name=nsx-vlan-cloud"
        vrf_ref: "/api/vrfcontext/?name=global"
        tenant: tenant1
        default_server_port: 30001
        health_monitor_refs:
          - "/api/healthmonitor?name=System-HTTP"
        placement_networks:
          - network_ref: "/api/network/?name=NSX-SB-WEB"
            subnet:
              mask: 24
              ip_addr:
                type: V4
                addr: 192.168.131.100
        servers:
          - ip:
              addr: 192.168.131.10
              type: 'V4'
          - ip:
              addr: 192.168.131.11
              type: 'V4'
          - ip:
              addr: 192.168.131.12
              type: 'V4'

    - name: Create HTTP Virtualservice NSXT
      vmware.alb.avi_virtualservice:
        avi_credentials: "{{ avi_credentials | default(omit) }}"
        api_context: "{{ avi_api_context | default(omit) }}"
        name: dummy-vs
        cloud_ref: "/api/cloud/?name=nsx-vlan-cloud"
        vrf_context_ref: "/api/vrfcontext/?name=global"
        tenant: tenant1
        application_profile_ref: "/api/applicationprofile/?name=System-Secure-HTTP"
        ssl_profile_ref: "/api/sslprofile/?name=System-Standard"
        ssl_key_and_certificate_refs: "/api/sslkeyandcertificate/?name=System-Default-Cert"
        services:
          - port: 80
            enable_ssl: false
          - port: 443
            enable_ssl: true
        pool_ref: "/api/pool?name=dummy-pool"
        vsvip_ref: "/api/vsvip/?name=dummy-vsvip"